# Substitutions needed
# board: nodemcu-32s

esp32:
  board: ${board}
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_BT_RESERVE_DRAM_ONLY: "y"
      # Enable WiFi/BLE coexistence
      CONFIG_ESP32_WIFI_SW_COEXIST_ENABLE: "y"

bluetooth_proxy:
  active: true

globals:
  - id: last_ble_time
    type: uint32_t
    initial_value: '0'

esp32_ble_tracker:
  scan_parameters:
    active: true
    interval: 150ms
    window: 120ms
  on_ble_advertise:
    then:
      - lambda: 'id(last_ble_time) = millis();'

interval:
  - interval: 1min
    then:
      - lambda: |-
          uint32_t timeout = 300000;
          if (millis() > timeout && (millis() - id(last_ble_time) > timeout)) {
            ESP_LOGW("watchdog", "No BLE traffic for 5 minutes. Triggering restart.");
            id(restart_button).press();
          }
